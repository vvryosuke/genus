<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Genus · der die das</title>
<style>
  :root{
    --paper:#F1EFE8; --screen:#FBFAF5; --ink:#211E1A; --ink2:#8C8880; --line:#E3E0D7;
    --der:#3D6B8E; --der-t:#E8EDF1;
    --das:#4E8A6B; --das-t:#E8F0EB;
    --die:#AE5273; --die-t:#F3E9EE;
    --disp:"Space Grotesk",-apple-system,system-ui,sans-serif;
    --cn:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{background:var(--paper);color:var(--ink);font-family:var(--cn);
    display:flex;flex-direction:column;max-width:480px;margin:0 auto;min-height:100%;
    overflow:hidden;user-select:none;touch-action:none;padding:0 14px;}

  /* 顶栏 */
  header{display:flex;align-items:flex-end;justify-content:space-between;padding:16px 4px 10px;}
  .wm{display:flex;flex-direction:column;gap:3px;}
  .wm .name{font-family:var(--disp);font-weight:700;font-size:1.15rem;letter-spacing:.02em;line-height:1;}
  .wm .sub{font-family:var(--disp);font-size:.62rem;letter-spacing:.34em;color:var(--ink2);text-transform:lowercase;}
  .stats{display:flex;gap:0;align-items:stretch;}
  .stat{padding:0 13px;text-align:right;border-left:1px solid var(--line);}
  .stat:first-child{border-left:none;}
  .stat .num{font-family:var(--disp);font-weight:600;font-size:1.2rem;font-variant-numeric:tabular-nums;line-height:1;}
  .stat .lab{font-size:.56rem;letter-spacing:.14em;color:var(--ink2);text-transform:uppercase;margin-top:4px;}
  .stat .num.bump{animation:bump .32s ease;}
  @keyframes bump{0%{transform:scale(1)}35%{transform:scale(1.5);color:var(--das)}100%{transform:scale(1)}}
  .stat .num.bad{animation:badshake .34s ease;}
  @keyframes badshake{0%{transform:translateX(0);color:#C26B5E}30%{transform:translateX(-3px)}60%{transform:translateX(3px);color:#C26B5E}100%{transform:translateX(0)}}
  .pause{margin-left:13px;align-self:center;width:34px;height:34px;border:1px solid var(--line);border-radius:10px;
    background:#fff;color:var(--ink);font-size:.7rem;line-height:1;cursor:pointer;letter-spacing:1px;
    display:flex;align-items:center;justify-content:center;transition:background .15s;}
  .pause:active{background:var(--paper);}

  /* 暂停遮罩 */
  .pausemask{position:absolute;inset:0;background:rgba(251,250,245,.86);z-index:5;
    display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
  .pausemask.show{display:flex;}
  .pausemask .t{font-family:var(--disp);font-weight:600;font-size:1.1rem;letter-spacing:.06em;color:var(--ink2);}
  .pausemask button{font-family:var(--disp);font-weight:600;border:none;background:var(--ink);color:#fff;
    font-size:.95rem;padding:13px 36px;border-radius:999px;cursor:pointer;}

  /* 游戏视口 */
  .screen{position:relative;flex:1;min-height:300px;border:1px solid var(--line);border-radius:20px;
    background:var(--screen);overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.03),0 8px 24px rgba(0,0,0,.03);}
  #cv{width:100%;height:100%;display:block;}

  /* 难度 + 校准 */
  .bar{display:flex;align-items:center;justify-content:space-between;padding:11px 4px 9px;gap:10px;}
  .seg{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:999px;padding:3px;}
  .seg button{font-family:var(--cn);border:none;background:none;padding:6px 12px;font-size:.76rem;
    color:var(--ink2);cursor:pointer;border-radius:999px;transition:all .15s;white-space:nowrap;}
  .seg button[data-d="crazy"].on{background:var(--die);}
  .seg button.on{background:var(--ink);color:#fff;}
  .cal{font-size:.64rem;color:var(--ink2);text-align:right;line-height:1.35;}
  .cal b{font-family:var(--disp);color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums;}

  /* 车道控件 */
  .keys{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;padding:2px 4px 16px;}
  .key{position:relative;border:1px solid var(--line);border-radius:15px;background:#fff;cursor:pointer;
    padding:13px 8px 11px;display:flex;flex-direction:column;align-items:center;gap:3px;
    overflow:hidden;transition:transform .07s ease, box-shadow .15s, background .15s;}
  .key::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--c);opacity:.5;}
  .key:active{transform:scale(.96);}
  .key .a{font-family:var(--disp);font-weight:700;font-size:1.4rem;color:var(--c);line-height:1;}
  .key .dir{font-family:var(--disp);font-size:.66rem;color:var(--ink2);letter-spacing:.05em;}
  .key .g{font-size:.6rem;color:var(--ink2);}
  .key.der{--c:var(--der);} .key.das{--c:var(--das);} .key.die{--c:var(--die);}
  .key.on{background:var(--t);box-shadow:0 0 0 2px var(--c) inset;}
  .key.der.on{--t:var(--der-t);} .key.das.on{--t:var(--das-t);} .key.die.on{--t:var(--die-t);}
  .key.on::before{opacity:1;}

  .foot{text-align:center;font-size:.62rem;color:var(--ink2);padding-bottom:14px;letter-spacing:.02em;}

  /* 开始页 */
  .overlay{position:fixed;inset:0;max-width:480px;margin:0 auto;background:var(--paper);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;z-index:10;padding:34px;}
  .overlay .big{font-family:var(--disp);font-weight:700;font-size:2.4rem;letter-spacing:-.01em;line-height:1.05;}
  .overlay .triad{display:flex;gap:10px;margin:18px 0 8px;}
  .overlay .chip{font-family:var(--disp);font-weight:600;font-size:1.05rem;padding:8px 18px;border-radius:12px;}
  .chip.d1{color:var(--der);background:var(--der-t);}
  .chip.d2{color:var(--das);background:var(--das-t);}
  .chip.d3{color:var(--die);background:var(--die-t);}
  .overlay p{margin:6px 0 0;color:var(--ink2);font-size:.9rem;line-height:1.7;max-width:300px;}
  .overlay p b{color:var(--ink);font-weight:600;}
  #startBtn{margin-top:22px;font-family:var(--disp);font-weight:600;border:none;background:var(--ink);color:#fff;
    font-size:1rem;padding:15px 44px;border-radius:999px;cursor:pointer;letter-spacing:.02em;}

  /* 轮结算 */
  .sumgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px 30px;margin:16px 0 2px;}
  .scell .n{font-family:var(--disp);font-weight:700;font-size:1.45rem;font-variant-numeric:tabular-nums;}
  .scell .n.gold{color:#C9A227;}
  .scell .l{font-size:.58rem;color:var(--ink2);letter-spacing:.12em;text-transform:uppercase;margin-top:3px;}
  .wrongs{margin-top:14px;font-size:.84rem;line-height:2;max-height:140px;overflow-y:auto;}
  .wrongs b{font-family:var(--disp);font-weight:600;}
  .wrongs .ok{color:var(--das);font-size:.8rem;}
  .mast{margin-top:12px;font-size:.68rem;color:var(--ink2);letter-spacing:.06em;}
  .mast b{color:var(--ink);font-family:var(--disp);}

  /* 主页菜单 / 设置页 / 单词记录 */
  .menu{display:flex;flex-direction:column;gap:12px;margin-top:26px;width:min(78%,260px);}
  .menu button{font-family:var(--cn);font-weight:600;font-size:1rem;padding:14px 0 11px;border-radius:16px;
    border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;}
  .menu button.primary{background:var(--ink);color:#fff;border-color:var(--ink);}
  .menu button .de{display:block;font-family:var(--disp);font-weight:500;font-size:.6rem;opacity:.5;
    letter-spacing:.26em;text-transform:lowercase;margin-top:3px;}
  .overlay .seg button{padding:9px 18px;font-size:.9rem;}
  .backlink{margin-top:16px;background:none;border:none;color:var(--ink2);font-size:.8rem;cursor:pointer;letter-spacing:.05em;}
  .btnrow{display:flex;gap:12px;margin-top:22px;}
  .pill{font-family:var(--disp);font-weight:600;border:none;background:var(--ink);color:#fff;
    font-size:.95rem;padding:14px 30px;border-radius:999px;cursor:pointer;}
  .pill.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);}
  .reclist{margin-top:14px;width:min(100%,340px);max-height:46vh;overflow-y:auto;text-align:left;
    border:1px solid var(--line);border-radius:14px;background:#fff;padding:2px 14px;}
  .recrow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:.84rem;}
  .recrow:last-child{border-bottom:none;}
  .recrow b{font-family:var(--disp);font-weight:600;min-width:104px;}
  .recrow .g{color:var(--ink2);flex:1;font-size:.74rem;}
  .recrow .lv{font-size:.58rem;color:var(--ink2);border:1px solid var(--line);padding:1px 4px;border-radius:5px;letter-spacing:.05em;}
  .recrow .m{display:flex;gap:2px;}
  .recrow .m i{width:7px;height:3px;border-radius:2px;background:var(--line);}
  .recrow .m i.f{background:var(--das);}
  .recrow .pc{font-variant-numeric:tabular-nums;color:var(--ink2);font-size:.72rem;min-width:32px;text-align:right;}
  .modeLab{font-size:.76rem;color:var(--ink2);letter-spacing:.04em;}
  .modeLab b{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums;}
  #homeBtn{background:#fff;color:var(--ink);border:1px solid var(--line);}
</style>

  ["der","Termin","预约","a2"],["die","Prüfung","考试 -ung","a2"],["die","Erfahrung","经验 -ung","a2"],["die","Meinung","意见 -ung","a2"],

const LANE={der:0,das:1,die:2},ART=["der","das","die"],COL=["#3D6B8E","#4E8A6B","#AE5273"];
const deck=WORDS.map((w,i)=>({id:i,art:w[0],word:w[1],gloss:w[2],lvl:w[3]||"a1",weight:3,streak:0,seen:0,correct:0}));
let lastId=-1;
function pick(){const pool=deck.filter(d=>d.id!==lastId);const tw=pool.reduce((s,d)=>s+d.weight,0);
  let r=Math.random()*tw,c=pool[0];for(const d of pool){r-=d.weight;if(r<=0){c=d;break;}}lastId=c.id;return c;}

const DIFF={
  slow:{base:2.5,scroll:0.34},
  fast:{base:1.48,scroll:0.60},
  crazy:{base:1.05,scroll:0.78}
};
let diff="slow";
const FACTOR=[1.5,1.25,1.0,0.82,0.66];
const mlvl=d=>Math.max(0,Math.min(4,d.streak));
const winBase=()=>mode==="rush"?2.5-(2.5-1.25)*rushRamp():DIFF[diff].base;   // 冲刺:窗口收紧,极速封顶在"快+"而非疯狂
const winSec=d=>winBase()*FACTOR[mlvl(d)];

const cv=document.getElementById("cv"),ctx=cv.getContext("2d");
let W=0,H=0,dpr=Math.min(2,window.devicePixelRatio||1);
function resize(){const r=cv.getBoundingClientRect();W=r.width;H=r.height;cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);layout();}
window.addEventListener("resize",resize);

let running=false,last=0,scroll=0,shake=0;
let dinoX,laneYs,laneGap,groundY;
let dino={lane:1,y:0,x:0,bonk:0,ring:0,squash:0};   // x:冲刺作答时短暂前冲
let gates=[],stats={correct:0,total:0,combo:0,distF:0};
let tapFx=null,zoneHi=0,zoneHiLane=1,startHint=4.5;   // 点击涟漪 / 区域高亮 / 起始提示
let parts=[],floats=[],banners=[],freeze=0,comboPop=0; // 粒子 / 飘字 / 里程碑横幅 / 顿帧 / combo徽章弹跳
let spawnDelay=0;   // 失误恢复拍:答错后下一词延迟出发
let sprint=0;                                          // 冲刺:0→1,世界整体向左抽走的强度(恐龙是镜头锚点,不位移)
let nextDistIdx=0;const DISTM=[100,250,500,1000,1500,2000,3000,5000,8000];
const PRAISE=["不错!","厉害!","Sehr gut!","火力全开!","Wahnsinn!","无人能挡!"];
let T=0,roundOver=false,fever=false;          // 游戏时钟 / 轮结算中 / FEVER状态
const FEVER_AT=10,GOLD="#C9A227",FEV="#C77B3F";
const newRound=n=>({n,total:0,right:0,blitz:0,maxCombo:0,newMast:0,wrong:[]});
let round=newRound(1);
let mode="endless",practiceN=30;                      // 模式与练习词数(进游戏前选定)
const DIFFNAME={slow:"慢",fast:"快",crazy:"疯狂"};
let rushHp=3;const BESTK="genus_best_v1";             // 冲刺模式:3条命 + 最佳里程
const rushRamp=()=>Math.min(1,stats.distF/1500);      // 0→1:加速曲线拉长到1500m

/* 词汇进度持久化(单词记录页的数据来源);以"冠词 单词"为键,扩词/重排不丢进度 */
const SAVEK="genus_progress_v2";
const wkey=d=>d.art+" "+d.word;
function loadProg(){try{const s=JSON.parse(localStorage.getItem(SAVEK)||"{}");
  deck.forEach(d=>{const r=s[wkey(d)];if(r){d.seen=r[0];d.correct=r[1];d.streak=r[2];d.weight=r[3];}});}catch(e){}}
function saveProg(){try{const s={};deck.forEach(d=>{if(d.seen)s[wkey(d)]=[d.seen,d.correct,d.streak,d.weight];});
  localStorage.setItem(SAVEK,JSON.stringify(s));}catch(e){}}
loadProg();

function layout(){
  dinoX=W*0.26;groundY=H-20;
  const top=H*0.30,bottom=H*0.86,span=bottom-top;   // 顶部留出词牌中性区,不偏向任何车道
  laneYs=[top,top+span*0.5,top+span];laneGap=span*0.5;
  if(!dino.y)dino.y=laneYs[dino.lane];
  if(!dino.x)dino.x=dinoX;
}
const worldSpeed=()=>W*(mode==="rush"?0.34+(0.70-0.34)*rushRamp():DIFF[diff].scroll);
const gateSpeed=d=>(W-dinoX)/winSec(d);

function spawnGate(){const d=pick(),c=LANE[d.art];
  const w=winSec(d);
  gates.push({x:W+24,word:d,spd:gateSpeed(d),correct:c,resolved:false,ok:false,flash:0,
    born:T,win:w,vis:null,bth:Math.min(0.9,w*0.55)});} // vis=单词进入可读区时刻,bth=BLITZ窗口
function blitzFx(x){const bx=Math.min(x,W-70);
  floatTxt(bx,laneYs[1]-46,"BLITZ!",GOLD,15);burst(bx,laneYs[1]-16,GOLD,9,0.7);
  tone(1320,1980,.1,"triangle",.12);
  if(navigator.vibrate)navigator.vibrate([12,28,20]);}  // 双脉冲打击震动(Android;iOS不支持网页震动)
// 冲刺作答模型:点对车道=锁定答案并触发冲刺(世界向左抽走,词牌冲到线上撞击结算);
// 点错=未结算,✗提示,词到线前可改答;不点=恐龙跑到线按当前车道结算
const setLane=i=>{const n=Math.max(0,Math.min(2,i));
  if(n!==dino.lane){dino.lane=n;dino.squash=1;}
  const g=nearest();
  if(g&&g.vis!=null&&!g.resolved&&!g.claimed){
    if(n===g.correct){
      g.claimed=true;                                  // 答案锁定,冲刺开始,撞线时结算
      g.willBlitz=!g.tried&&T<=g.vis+g.bth;
      if(g.willBlitz)blitzFx(g.x);
    }else if(!g.tried){g.tried=true;                   // 错误尝试:断combo但不算错词,可改答
      stats.combo=0;updateHUD();
      floatTxt(dinoX+22,laneYs[n]-14,"✗","#8C8880",14);
      tone(230,150,.08,"triangle",.08);}}};

function resolve(g){
  g.resolved=true;g.spd*=3.5;                          // 已结算的词牌快速退场,避免与新词重叠
  const d=g.word;d.seen++;
  const right=g.claimed?true:dino.lane===g.correct;    // 锁定过的答案不受之后换道影响
  const fx=Math.min(dino.x+14,W-60);                   // 特效落在撞击点(冲刺=词牌处,被动=作答线)
  g.ok=right;g.flash=1;stats.total++;
  if(right){stats.correct++;stats.combo++;d.correct++;dino.ring=1;
    freeze=0.05;comboPop=1;sfxRight(stats.combo);if(navigator.vibrate)navigator.vibrate(12);
    burst(fx,laneYs[g.correct],COL[g.correct],10+Math.min(stats.combo,14));
    floatTxt(fx+18,laneYs[g.correct]-36,"+1",COL[g.correct],13);
    if(!g.tried){                                      // 干净答对才涨掌握度;试错答对不算学会
      d.streak++;d.weight=Math.max(1,d.weight-1);
      if(d.streak===4){floatTxt(fx,laneYs[g.correct]-58,"★ "+d.word+" 已掌握",COL[1],13);round.newMast++;}
      // BLITZ:锁定时已判定(首次出手即正确且在金条窗口内),撞线时入账
      if(g.claimed&&g.willBlitz){round.blitz++;stats.distF+=5;}}
    if(!fever&&stats.combo>=FEVER_AT){fever=true;showBanner("FEVER ×2","双倍里程 · 保持连击!",FEV);}
    if(stats.combo>=5&&stats.combo%5===0&&stats.combo!==FEVER_AT)
      showBanner("COMBO ×"+stats.combo,PRAISE[Math.min(PRAISE.length-1,stats.combo/5-1)],COL[g.correct]);
    round.right++;round.maxCombo=Math.max(round.maxCombo,stats.combo);
  }else{stats.combo=0;d.streak=0;d.weight=Math.min(9,d.weight+3);dino.bonk=1;shake=1;
    freeze=0.12;sfxWrong();if(navigator.vibrate)navigator.vibrate([40,50,40]);
    floatTxt(fx+18,laneYs[g.correct],ART[g.correct]+"!",COL[g.correct],17);
    if(fever){fever=false;floatTxt(W*0.5,H*0.42,"FEVER 结束","#8C8880",13);}
    if(mode==="rush"){rushHp--;floatTxt(24+rushHp*20,H-36,"-♥","#AE5273",14);
      if(rushHp<=0){freeze=0.3;setTimeout(endRun,800);}}
    if(!round.wrong.some(w=>w.id===d.id))round.wrong.push({id:d.id,art:d.art,word:d.word,gloss:d.gloss});
  }
  round.total++;saveProg();
  const ce=document.getElementById("combo");ce.classList.remove("bump","bad");
  void ce.offsetWidth;ce.classList.add(right?"bump":"bad");
  speak(d);updateHUD();
  if(right)spawnGate();else spawnDelay=0.6;   // 失误恢复拍:看清揭晓再来下一词;答对保持冲刺节奏
  if(mode==="practice"&&round.total>=practiceN)setTimeout(endRound,700);   // 留0.7s看清最后一词的反馈
}

function sumShow(title,cells,againLabel){
  roundOver=true;paused=true;sfxMile();
  document.getElementById("sumTitle").textContent=title;
  document.getElementById("sumGrid").innerHTML=cells.map(c=>
    `<div class="scell"><div class="n ${c[2]||""}">${c[0]}</div><div class="l">${c[1]}</div></div>`).join("");
  document.getElementById("sumWrong").innerHTML=round.wrong.length
    ?"本轮错词:<br>"+round.wrong.map(w=>`<b style="color:${COL[LANE[w.art]]}">${w.art} ${w.word}</b> · ${w.gloss}`).join("<br>")
    :`<span class="ok">零失误 ✦ Fehlerfrei!</span>`;
  const m=deck.filter(d=>mlvl(d)>=4).length;
  document.getElementById("sumMast").innerHTML=`题库掌握进度 <b>${m} / ${deck.length}</b>`;
  document.getElementById("againBtn").textContent=againLabel;
  document.getElementById("sumview").style.display="flex";
}
function endRound(){
  if(roundOver)return;
  const acc=Math.round(round.right/round.total*100);
  sumShow("练习完成 · "+practiceN+" 词",[
    [acc+"%","正确率",""],["×"+round.maxCombo,"最高连击",""],[round.blitz,"Blitz 秒答","gold"],
    [round.newMast,"新掌握",""],[Math.floor(stats.distF),"总里程",""],
    [Math.round(round.blitz/round.total*100)+"%","Blitz率","gold"]],"再来一组 →");
}
function endRun(){
  if(roundOver)return;
  const m=Math.floor(stats.distF),old=+(localStorage.getItem(BESTK)||0),nb=m>old;
  if(nb){try{localStorage.setItem(BESTK,String(m));}catch(e){}}
  const acc=round.total?Math.round(round.right/round.total*100):0;
  sumShow(nb?"✦ 新纪录 · "+m+" m":"冲刺结束 · "+m+" m",[
    [m,"本次里程",nb?"gold":""],[Math.max(old,m),"最佳里程",nb?"gold":""],
    ["×"+round.maxCombo,"最高连击",""],[round.blitz,"Blitz","gold"],
    [round.newMast,"新掌握",""],[acc+"%","正确率",""]],"再来一次 →");
}

$("mEndless").addEventListener("click",()=>{mode="endless";$("setupTitle").textContent="无限模式";
  $("cntSeg").style.display="none";show("setupview");});

  $("cntSeg").style.display="";show("setupview");});

$("recBack").addEventListener("click",()=>show("homeview"));

  diff=b.dataset.d;[...$("spdSeg").children].forEach(x=>x.classList.toggle("on",x===b));});

  practiceN=+b.dataset.n;[...$("cntSeg").children].forEach(x=>x.classList.toggle("on",x===b));});

  deck.forEach(d=>{d.seen=0;d.correct=0;d.streak=0;d.weight=3;});renderRecords();});

/* 单词记录:未掌握在前,显示掌握度与正确率 */
function renderRecords(){
  const m=deck.filter(d=>mlvl(d)>=4).length,
        tot=deck.reduce((s,d)=>s+d.seen,0),cor=deck.reduce((s,d)=>s+d.correct,0);
  $("recSum").innerHTML=`已掌握 <b>${m} / ${deck.length}</b>`+
    (tot?` · 共答 ${tot} 次 · 正确率 <b>${Math.round(cor/tot*100)}%</b>`:" · 还没有练习记录");
  $("recList").innerHTML=[...deck].sort((a,b)=>mlvl(a)-mlvl(b)||(b.seen-b.correct)-(a.seen-a.correct))
    .map(d=>{const lv=mlvl(d);
      return `<div class="recrow"><b style="color:${COL[LANE[d.art]]}">${d.art} ${d.word}</b>`+
        `<span class="g">${d.gloss}</span><span class="lv">${d.lvl.toUpperCase()}</span>`+
        `<span class="m">${[0,1,2,3].map(k=>`<i class="${k<lv?"f":""}"></i>`).join("")}</span>`+
        `<span class="pc">${d.seen?Math.round(d.correct/d.seen*100)+"%":"—"}</span></div>`;}).join("");
}
function speak(d){if(!("speechSynthesis"in window))return;
  const u=new SpeechSynthesisUtterance(d.art+" "+d.word);u.lang="de-DE";u.rate=.92;
  const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith("de"));if(v)u.voice=v;
  speechSynthesis.cancel();speechSynthesis.speak(u);}

/* 音效:答对音高随combo上升,答错低沉,里程碑小号角 */
let AC=null;
function sfx(fn){try{if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();
  if(AC.state==="suspended")AC.resume();fn(AC);}catch(e){}}
function tone(f0,f1,dur,type,vol,when=0){sfx(a=>{const o=a.createOscillator(),g=a.createGain(),t=a.currentTime+when;
  o.type=type;o.frequency.setValueAtTime(f0,t);o.frequency.exponentialRampToValueAtTime(Math.max(30,f1),t+dur);
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur+.02);});}
const sfxRight=c=>{const f=520*Math.pow(2,Math.min(c,12)/12);tone(f,f*1.5,.11,"triangle",.14);};
const sfxWrong=()=>tone(170,60,.22,"sawtooth",.15);
const sfxMile=()=>[0,4,7,12].forEach((s,i)=>{const f=660*Math.pow(2,s/12);tone(f,f,.13,"triangle",.11,i*.07);});

/* 粒子 / 飘字 / 里程碑横幅 */
function burst(x,y,c,n=14,pow=1){for(let i=0;i<n;i++){const a=Math.random()*6.28,s=(70+Math.random()*170)*pow;
  parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-50*pow,t:1,c,r:2+Math.random()*2.5});}}
function floatTxt(x,y,txt,c,size=14){floats.push({x,y,txt,c,size,t:1});}
function showBanner(txt,sub,c){banners.push({txt,sub,c,t:0});sfxMile();
  burst(W*0.5,H*0.44,c,26,1.4);if(navigator.vibrate)navigator.vibrate([20,30,20]);}

function update(dt){
  if(freeze>0){freeze=Math.max(0,freeze-dt);dt*=0.18;}   // 顿帧:命中瞬间世界短暂减速
  T+=dt;
  // 冲刺:锁定后恐龙冲向词牌,接触瞬间撞击结算,然后迅速退回;sprint驱动前倾/速度线/背景加速
  const claiming=gates.some(g=>!g.resolved&&g.claimed);
  sprint+=((claiming?1:0)-sprint)*Math.min(1,dt*(claiming?16:8));
  const M=1+sprint*5;
  const ws=worldSpeed()*M;scroll=(scroll+ws*dt)%44;stats.distF+=ws*dt*0.10*(fever?2:1);
  if(fever&&Math.random()<dt*16)parts.push({x:dinoX-16,y:dino.y-12+(Math.random()-.5)*22,
    vx:-90-Math.random()*70,vy:(Math.random()-.5)*50,t:.7,c:Math.random()<.5?FEV:GOLD,r:2+Math.random()*2});
  if(nextDistIdx<DISTM.length&&stats.distF>=DISTM[nextDistIdx]){
    showBanner(DISTM[nextDistIdx]+" METER","里程碑达成",COL[0]);nextDistIdx++;}
  // 已结算词牌借冲刺加速快速退场;未锁定的新词永远按正常速度来,反应窗口不被偷走
  for(const g of gates){g.x-=g.spd*dt*(g.resolved?M:1);
    if(!g.resolved&&g.vis==null&&g.x<W-56)g.vis=T;   // 单词滑入可读区,BLITZ计时从此刻起
    if(!g.resolved&&g.x<=dinoX)resolve(g);if(g.flash>0)g.flash=Math.max(0,g.flash-dt*1.5);}
  const cg=gates.find(g=>g.claimed&&!g.resolved);
  if(cg){dino.x+=(cg.x-10-dino.x)*Math.min(1,dt*15);   // 冲向词牌
    if(cg.x-dino.x<18)resolve(cg);}                    // 接触=撞击结算
  if(spawnDelay>0){spawnDelay-=dt;if(spawnDelay<=0)spawnGate();}   // 恢复拍结束,下一词出发
  gates=gates.filter(g=>g.x>-280);
  dino.y+=(laneYs[dino.lane]-dino.y)*Math.min(1,dt*14);
  if(!cg)dino.x+=(dinoX-dino.x)*Math.min(1,dt*10);   // 撞击后迅速退回原位
  if(dino.bonk>0)dino.bonk=Math.max(0,dino.bonk-dt*2.2);
  if(dino.ring>0)dino.ring=Math.max(0,dino.ring-dt*2.2);
  if(shake>0)shake=Math.max(0,shake-dt*3);
  if(zoneHi>0)zoneHi=Math.max(0,zoneHi-dt*3);
  if(startHint>0)startHint=Math.max(0,startHint-dt);
  if(tapFx){tapFx.t-=dt*2.6;if(tapFx.t<=0)tapFx=null;}
  if(comboPop>0)comboPop=Math.max(0,comboPop-dt*3);
  if(dino.squash>0)dino.squash=Math.max(0,dino.squash-dt*5);
  for(const p of parts){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=420*dt;p.t-=dt*1.5;}
  parts=parts.filter(p=>p.t>0);
  for(const f of floats){f.y-=30*dt;f.t-=dt*1.1;}
  floats=floats.filter(f=>f.t>0);
  if(banners.length){banners[0].t+=dt;if(banners[0].t>1.7)banners.shift();}
}
const nearest=()=>{let b=null,bx=1e9;for(const g of gates){if(!g.resolved&&g.x<bx){bx=g.x;b=g;}}return b;};
const DF='"Space Grotesk",sans-serif';
const CNF='-apple-system,"PingFang SC","Microsoft YaHei",sans-serif';
// 词牌上只显示干净释义:剥离 ·阳性! / -ung / (弱变化) 等会泄露词性的标注(复习页保留)
const cleanGloss=g=>g.replace(/·.*$|\s+-[A-Za-zäöüß]+$|[（(].*$/,"").trim();
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function heart(x,y,s,filled,rot){ctx.save();ctx.translate(x,y);ctx.rotate(rot||0);ctx.scale(s,s);
  ctx.beginPath();ctx.moveTo(0,0.42);
  ctx.bezierCurveTo(-0.58,-0.06,-0.44,-0.64,-0.02,-0.32);
  ctx.bezierCurveTo(0.42,-0.66,0.58,-0.08,0,0.42);ctx.closePath();
  ctx.fillStyle=filled?"#AE5273":"#FBFAF5";ctx.fill();
  ctx.lineWidth=1.8/s;ctx.lineJoin="round";
  ctx.strokeStyle=filled?"#211E1A":hex("#211E1A",0.28);ctx.stroke();ctx.restore();}
function hex(c,a){const n=parseInt(c.slice(1),16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;}

function draw(){
  ctx.clearRect(0,0,W,H);
  const sx=shake>0?(Math.random()-.5)*5*shake:0;ctx.save();ctx.translate(sx,0);

  // 被点中的区域:短暂柔光高亮
  if(zoneHi>0){const y=laneYs[zoneHiLane];ctx.fillStyle=hex(COL[zoneHiLane],0.12*zoneHi);
    rr(2,y-laneGap*0.5,W-4,laneGap,14);ctx.fill();}

  // 三条车道:淡路面带 + 路面字母 + 滚动中线
  for(let i=0;i<3;i++){
    const y=laneYs[i],act=dino.lane===i;
    ctx.fillStyle=hex(COL[i],act?0.11:0.05);
    rr(6,y-laneGap*0.4,W-12,laneGap*0.8,12);ctx.fill();
    // 路面字母(大、淡)
    ctx.font=`700 ${laneGap*0.5}px ${DF}`;ctx.textAlign="left";ctx.textBaseline="middle";
    ctx.fillStyle=hex(COL[i],act?0.22:0.12);ctx.fillText(ART[i],16,y);
    // 中线
    ctx.strokeStyle=hex(COL[i],act?0.55:0.25);ctx.lineWidth=act?2:1.4;
    ctx.setLineDash([16,22]);ctx.lineDashOffset=scroll;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();ctx.setLineDash([]);
  }
  ctx.textBaseline="alphabetic";

  // 作答线(词牌到此仍未被冲刺,按恐龙当前车道结算)
  ctx.strokeStyle=hex("#211E1A",0.1);ctx.lineWidth=1.5;ctx.setLineDash([4,7]);
  ctx.beginPath();ctx.moveTo(dinoX+14,laneYs[0]-laneGap*0.42);ctx.lineTo(dinoX+14,laneYs[2]+laneGap*0.42);ctx.stroke();
  ctx.setLineDash([]);

  // 词牌(胶囊)
  for(const g of gates){
    const x=g.x,wy=44,d=g.word;   // 词牌悬在车道之外的中性顶区,不暗示任何词性
    ctx.font=`600 21px ${DF}`;const tw=ctx.measureText(d.word).width;
    ctx.font=`11px ${CNF}`;const gl=cleanGloss(d.gloss),gw=ctx.measureText(gl).width;
    const pw=Math.max(tw,gw)+34,ph=58;
    // 引导竖线
    ctx.strokeStyle=g.resolved?hex(g.ok?COL[g.correct]:"#AE5273",0.4):hex("#211E1A",0.10);
    ctx.lineWidth=1;ctx.setLineDash([3,6]);
    ctx.beginPath();ctx.moveTo(x,wy+31);ctx.lineTo(x,laneYs[2]+laneGap*0.4);ctx.stroke();ctx.setLineDash([]);
    // 掌握度短条
    const lv=mlvl(d);
    for(let k=0;k<4;k++){ctx.fillStyle=k<lv?COL[1]:hex("#211E1A",0.12);rr(x-16+k*9,wy-ph/2-13,6,3,1.5);ctx.fill();}
    // 牌
    ctx.fillStyle="#FBFAF5";rr(x-pw/2,wy-ph/2,pw,ph,13);ctx.fill();
    ctx.lineWidth=1.5;ctx.strokeStyle=g.resolved?(g.ok?COL[g.correct]:"#C26B5E"):"#E3E0D7";
    rr(x-pw/2,wy-ph/2,pw,ph,13);ctx.stroke();
    if(g.resolved){ctx.font=`600 12px ${DF}`;ctx.fillStyle=COL[g.correct];ctx.textAlign="center";
      ctx.fillText(d.art,x,wy+ph/2+17);}
    ctx.font=`600 21px ${DF}`;ctx.fillStyle="#211E1A";ctx.textAlign="center";ctx.fillText(d.word,x,wy);
    ctx.font=`11px ${CNF}`;ctx.fillStyle=hex("#211E1A",0.55);ctx.fillText(gl,x,wy+18);
    // BLITZ窗口:金色流逝条(窗口内主动冲刺=BLITZ)
    if(!g.resolved&&g.vis!=null){const lf=(g.vis+g.bth-T)/g.bth;
      if(lf>0){ctx.fillStyle=hex(GOLD,0.9);rr(x-pw/2+8,wy+ph/2-5,(pw-16)*lf,2.5,1.25);ctx.fill();}}
  }

  // 恐龙 + 影子
  const dx=dino.x,dy=dino.y;
  const ph2=scroll/44*Math.PI*2,lp=Math.sin(ph2),cf=Math.cos(ph2),bob=Math.abs(cf)*2.4; // 跑步相位/摆腿/抬脚/起伏
  ctx.fillStyle=hex("#211E1A",0.07);ctx.beginPath();ctx.ellipse(dx,dy+10,16-bob*1.2,4,0,0,7);ctx.fill();
  if(dino.ring>0){ctx.strokeStyle=COL[dino.lane];ctx.globalAlpha=dino.ring;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(dx,dy-13,28+(1-dino.ring)*16,0,7);ctx.stroke();ctx.globalAlpha=1;}
  if(stats.combo>=3){ctx.strokeStyle=hex(COL[dino.lane],0.3);ctx.lineWidth=2;
    for(let s=0;s<3;s++){const ox=-22-s*9;ctx.beginPath();ctx.moveTo(dx+ox,dy-22+s*7);ctx.lineTo(dx+ox-9,dy-22+s*7);ctx.stroke();}}
  if(stats.combo>=2){const s=1+0.5*comboPop;ctx.save();ctx.translate(dx,dy-58);ctx.scale(s,s);
    ctx.font=`700 13px ${DF}`;const ct="×"+stats.combo,cw=ctx.measureText(ct).width+14;
    ctx.fillStyle=hex(COL[dino.lane],0.95);rr(-cw/2,-11,cw,22,11);ctx.fill();
    ctx.fillStyle="#FBFAF5";ctx.textAlign="center";ctx.fillText(ct,0,4);ctx.restore();}
  // 角色:纸面填充+墨线描边,与UI卡片同一设计语言;连击时系车道色围巾
  const INK="#211E1A",PAPER="#FBFAF5";
  if(sprint>0.12){ctx.strokeStyle=hex("#211E1A",0.25*sprint);ctx.lineWidth=2;   // 冲刺速度线
    for(let s=0;s<4;s++){const oy=-34+s*9;ctx.beginPath();
      ctx.moveTo(dx-26,dy+oy);ctx.lineTo(dx-26-22*sprint,dy+oy);ctx.stroke();}}
  ctx.save();ctx.translate(dx,dy-bob);ctx.scale(1+0.15*dino.squash,1-0.18*dino.squash);
  ctx.rotate(dino.bonk>0?-0.28*dino.bonk:0.03*lp+0.12*sprint);   // 答错后仰 / 奔跑轻摆 / 冲刺前倾
  ctx.lineJoin="round";ctx.lineCap="round";
  // 双腿(屈膝交替,摆动腿抬脚)
  ctx.strokeStyle=INK;ctx.lineWidth=2.6;
  const ffy=9-Math.max(0,cf)*5,bfy=9-Math.max(0,-cf)*5;
  ctx.beginPath();ctx.moveTo(0,-7);ctx.quadraticCurveTo(5+lp*3,-1,2+lp*7,ffy);ctx.lineTo(6+lp*7,ffy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-9,-7);ctx.quadraticCurveTo(-4-lp*3,-1,-7-lp*7,bfy);ctx.lineTo(-3-lp*7,bfy);ctx.stroke();
  // 一笔闭合剪影:尾→锯齿背脊→短颈→头→吻→胸腹
  ctx.beginPath();
  ctx.moveTo(-28,-7+lp*1.5);                       // 尾尖(随步伐轻摆)
  ctx.quadraticCurveTo(-20,-10,-15,-20);           // 尾上缘
  ctx.lineTo(-13,-27);ctx.lineTo(-9,-23);          // 背脊锯齿1
  ctx.lineTo(-7,-30);ctx.lineTo(-3,-26);           // 背脊锯齿2
  ctx.quadraticCurveTo(-2,-36,3,-40);              // 短颈
  ctx.quadraticCurveTo(8,-44,14,-43);              // 头顶
  ctx.quadraticCurveTo(20,-41,20,-36);             // 额→吻端
  ctx.lineTo(11,-33.5);                            // 颌线
  ctx.quadraticCurveTo(7,-27,7,-20);               // 胸
  ctx.quadraticCurveTo(7,-11,3,-6);                // 腹
  ctx.lineTo(-12,-6);                              // 臀底
  ctx.quadraticCurveTo(-21,-6,-28,-7+lp*1.5);      // 尾下缘
  ctx.closePath();
  ctx.fillStyle=PAPER;ctx.fill();
  ctx.lineWidth=2;ctx.stroke();
  // 围巾(连击≥3,车道色,随跑飘动)
  if(stats.combo>=3){ctx.fillStyle=COL[dino.lane];
    ctx.beginPath();ctx.moveTo(2,-32.5);ctx.lineTo(4,-26.5);
    ctx.quadraticCurveTo(-4,-25.5+lp,-9-lp*3,-22.5+lp*2);
    ctx.quadraticCurveTo(-4,-28.5,2,-32.5);ctx.closePath();ctx.fill();}
  // 小手臂
  ctx.strokeStyle=INK;ctx.lineWidth=2.2;
  ctx.beginPath();ctx.moveTo(6,-19);ctx.quadraticCurveTo(10,-17,11,-14+lp);ctx.stroke();
  // 眼(偶尔眨) + 鼻孔 + 嘴角
  if(Math.sin(T*1.7)>0.97){ctx.beginPath();ctx.moveTo(9,-38);ctx.lineTo(13,-38);ctx.stroke();}
  else{ctx.fillStyle=INK;ctx.beginPath();ctx.arc(11,-38,1.9,0,7);ctx.fill();}
  ctx.fillStyle=INK;ctx.beginPath();ctx.arc(17.6,-37.6,0.8,0,7);ctx.fill();
  ctx.lineWidth=1.4;ctx.beginPath();ctx.moveTo(13.5,-33.8);ctx.lineTo(10.5,-32.2);ctx.stroke();
  ctx.restore();
  ctx.restore();

  // 点击涟漪反馈
  if(tapFx){const a=Math.max(0,tapFx.t);ctx.strokeStyle=hex(COL[tapFx.lane],0.5*a);ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(tapFx.x,tapFx.y,14+(1-a)*26,0,7);ctx.stroke();}

  // 彩屑粒子
  for(const p of parts){ctx.globalAlpha=Math.max(0,p.t);ctx.fillStyle=p.c;
    ctx.fillRect(p.x-p.r/2,p.y-p.r/2,p.r,p.r);}
  ctx.globalAlpha=1;

  // 飘字
  for(const f of floats){ctx.globalAlpha=Math.max(0,Math.min(1,f.t*1.4));
    ctx.font=`700 ${f.size}px ${DF}`;ctx.textAlign="center";ctx.fillStyle=f.c;
    ctx.fillText(f.txt,f.x,f.y);}
  ctx.globalAlpha=1;

  // 答错:全屏淡红闪
  if(dino.bonk>0){ctx.fillStyle=hex("#C26B5E",0.10*dino.bonk);ctx.fillRect(0,0,W,H);}

  // FEVER:暖色滤镜 + 右上脉动徽章(顶区让位给词牌)
  if(fever){
    ctx.fillStyle=hex(FEV,0.05+0.02*Math.sin(T*6));ctx.fillRect(0,0,W,H);
    const s=1+0.05*Math.sin(T*8);
    ctx.save();ctx.translate(W-62,H-26);ctx.scale(s,s);
    ctx.font=`700 13px ${DF}`;const ft="FEVER ×2",fw=ctx.measureText(ft).width+22;
    ctx.fillStyle=FEV;rr(-fw/2,-13,fw,26,13);ctx.fill();
    ctx.fillStyle="#FBFAF5";ctx.textAlign="center";ctx.fillText(ft,0,4.5);ctx.restore();}

  // 冲刺模式:三颗手绘爱心(左下,墨线描边,微微歪斜)
  if(mode==="rush")for(let i=0;i<3;i++)heart(22+i*24,H-20,9,i<rushHp,[-0.14,0.06,-0.05][i]);

  // 里程碑横幅:弹入 + 停留 + 淡出
  if(banners.length){const b=banners[0],t=b.t;
    const ain=Math.min(1,t*5),aout=Math.min(1,(1.7-t)*2.5),a=Math.max(0,Math.min(ain,aout));
    const s=1+(1-ain)*0.6;
    ctx.save();ctx.globalAlpha=a;ctx.translate(W/2,H*0.44);ctx.scale(s,s);
    ctx.font=`700 30px ${DF}`;ctx.textAlign="center";ctx.fillStyle=b.c;ctx.fillText(b.txt,0,0);
    ctx.font=`12px ${CNF}`;ctx.fillStyle=hex("#211E1A",0.6);ctx.fillText(b.sub,0,24);
    ctx.restore();}

  // 起始几秒:淡淡标出三个可点区域
  if(startHint>0){const a=Math.min(1,startHint/1.5)*0.9;
    ctx.save();ctx.globalAlpha=a;
    for(let i=0;i<3;i++){const y=laneYs[i];
      ctx.strokeStyle=hex(COL[i],0.5);ctx.lineWidth=1.5;ctx.setLineDash([5,6]);
      rr(4,y-laneGap*0.46,W-8,laneGap*0.92,14);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle=hex("#211E1A",0.55);ctx.font=`500 12px ${DF}`;ctx.textAlign="right";
      ctx.fillText(["点此 ↑","点此 ●","点此 ↓"][i],W-14,y+4);}
    ctx.restore();}
}
function updateHUD(){
  document.getElementById("dist").textContent=Math.floor(stats.distF);
  document.getElementById("combo").textContent=stats.combo;
  document.getElementById("acc").textContent=stats.total?Math.round(stats.correct/stats.total*100)+"%":"—";
  const n=nearest();document.getElementById("winsec").textContent=n?winSec(n.word).toFixed(1)+"s":"—";
  document.getElementById("modeLab").innerHTML=mode==="practice"
    ?`练习 <b>${round.total} / ${practiceN}</b> · ${DIFFNAME[diff]}`
    :mode==="rush"?`冲刺 · 极速 <b>${Math.round(rushRamp()*100)}%</b>`
    :`无限 · ${DIFFNAME[diff]}`;
  document.querySelectorAll(".key").forEach((k,i)=>k.classList.toggle("on",dino.lane===i));
}
function loop(t){if(!running||paused)return;const dt=Math.min(.05,(t-last)/1000);last=t;update(dt);draw();updateHUD();requestAnimationFrame(loop);}

document.querySelectorAll(".key").forEach(k=>k.addEventListener("click",()=>setLane(+k.dataset.l)));
document.addEventListener("keydown",e=>{
  if(e.key===" "||e.key==="Escape"){e.preventDefault();if(running)setPause(!paused);return;}
  if(paused)return;
  if(e.key==="ArrowUp")setLane(dino.lane-1);else if(e.key==="ArrowDown")setLane(dino.lane+1);
  else if(e.key==="1")setLane(0);else if(e.key==="2")setLane(1);else if(e.key==="3")setLane(2);});
function tapLaneFromY(clientY){
  const r=cv.getBoundingClientRect();const y=clientY-r.top;
  const b1=(laneYs[0]+laneYs[1])/2, b2=(laneYs[1]+laneYs[2])/2;
  return y<b1?0:(y<b2?1:2);
}
function tapAt(clientX,clientY){
  if(!running||paused)return;
  const r=cv.getBoundingClientRect();
  const lane=tapLaneFromY(clientY);
  setLane(lane);
  zoneHi=1;zoneHiLane=lane;startHint=0;
  tapFx={x:clientX-r.left,y:clientY-r.top,lane,t:1};
}
cv.addEventListener("pointerdown",e=>{tapAt(e.clientX,e.clientY);},{passive:true});

function begin(){
  show("");resize();   // 隐藏所有页面,进入游戏
  sfx(()=>{});  // 在用户手势内创建/恢复AudioContext(iOS要求)
  if("speechSynthesis"in window)speechSynthesis.speak(new SpeechSynthesisUtterance(""));
  // 整局重置(词汇掌握度保留并持久化,局内统计清零)
  gates.length=0;parts.length=0;floats.length=0;banners.length=0;
  stats={correct:0,total:0,combo:0,distF:0};round=newRound(1);
  nextDistIdx=0;fever=false;freeze=0;roundOver=false;tapFx=null;spawnDelay=0;
  dino.lane=1;dino.y=laneYs[1];dino.x=dinoX;sprint=0;startHint=3.5;rushHp=3;
  spawnGate();running=true;paused=false;last=performance.now();requestAnimationFrame(loop);
}
let paused=false;
function setPause(p){
  if(roundOver)return;   // 结算画面接管,由"下一轮"按钮恢复
  if(!running&&!paused)return;
  paused=p;
  document.getElementById("pausemask").classList.toggle("show",p);
  document.getElementById("pauseBtn").textContent=p?"▶":"❙❙";
  if(!p){last=performance.now();requestAnimationFrame(loop);}  // 恢复:重置时间避免跳帧
}
document.getElementById("pauseBtn").addEventListener("click",()=>{if(running)setPause(!paused);});
document.getElementById("resumeBtn").addEventListener("click",()=>setPause(false));
document.getElementById("startBtn").addEventListener("click",()=>{
  if(document.fonts&&document.fonts.load){
    Promise.all([document.fonts.load('700 22px "Space Grotesk"'),document.fonts.load('600 22px "Space Grotesk"')]).then(begin).catch(begin);
  }else begin();
});
if("speechSynthesis"in window){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=()=>{};}
resize();
</script>
